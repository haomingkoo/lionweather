        "pkg-path": "nodejs"
      },
      "uv": {
        "pkg-path": "uv"
      }
    },
    "vars": {
      "BACKEND_PORT": "8000",
      "FRONTEND_PORT": "5173"
    },
    "options": {},
    "services": {
      "backend": {
        "command": "cd \"$FLOX_ENV_PROJECT/backend\"\n[ -f .env ] || cp .env.example .env\nuv sync\nexec uv run uvicorn app.main:app --reload --port \"$BACKEND_PORT\"\n"
      },
      "frontend": {
        "command": "cd \"$FLOX_ENV_PROJECT/frontend\"\n[ -d node_modules ] || npm install\nexport VITE_BACKEND_PORT=\"$BACKEND_PORT\"\nexec npm run dev -- --host 127.0.0.1 --port \"$FRONTEND_PORT\"\n"
      }
    }
